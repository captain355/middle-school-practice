# Nginx 配置示例
# 将此配置添加到你的 nginx server 块中

server {
    listen 80;
    server_name your-domain.com;
    root /path/to/practice-app/dist;
    index index.html;

    # SPA 路由回退：所有非文件/目录请求都指向 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（可选，提升性能）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip 压缩（可选）
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1000;
}
