services:
  - type: web
    name: middle-school-practice
    runtime: node
    plan: free
    buildCommand: cd packages/client && npm install && npx vite build --define VITE_API_URL=ENV_VITE_API_URL && cd ../.. && cd packages/server && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd packages/server && npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api/v1
      - key: DATABASE_URL
        generateValue: true  # Render 会自动生成 SQLite 路径
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: PORT
        value: 10000
